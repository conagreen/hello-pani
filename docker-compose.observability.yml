# 선택 확장 — Prometheus + Grafana로 부하 진행을 실시간 시각화한다.
#
# 사용법 (권장 — review.sh가 자동으로 모두 처리):
#   ./review.sh                           # 메뉴에서 [g] 모니터링 토글
#
# 수동 사용:
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml -f docker-compose.observability.yml up -d
#   open http://localhost:3000/d/hello-pani-main   # admin / admin
#
# scrape target은 docker-compose.scale.yml의 app-1, app-2다 (observability/prometheus.yml).
# host에서 ./gradlew bootRun을 같이 쓰려면 prometheus.yml에 host.docker.internal:8080을 추가하라.

services:
  # base docker-compose.yml의 mysql 서비스에 perf_schema 권한 init script만 추가한다.
  # 처음 빈 볼륨으로 시작하는 경우 자동 적용되며, 기존 볼륨에는 docker exec 으로 한 번 실행해야 한다.
  mysql:
    volumes:
      - ./observability/mysql-init:/docker-entrypoint-initdb.d:ro

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis

  mysql-exporter:
    image: prom/mysqld-exporter:v0.16.0
    ports:
      - "9104:9104"
    command:
      - --config.my-cnf=/etc/.my.cnf
      - --collect.global_status
      - --collect.global_variables
      - --collect.info_schema.processlist
      - --collect.info_schema.innodb_metrics
      # SQL digest별 통계: 어떤 패턴이 얼마나 도는지 정량화. PreparedStatement 파라미터는 자동 정규화.
      - --collect.perf_schema.eventsstatementssum
    volumes:
      - ./observability/mysql-exporter.cnf:/etc/.my.cnf:ro
    depends_on:
      - mysql
