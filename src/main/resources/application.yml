spring:
  application:
    name: hello-pani
  datasource:
    url: jdbc:mysql://localhost:3306/hellopani
    username: hellopani
    password: hellopani
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 200ms
      connect-timeout: 200ms
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      # Grafana 대시보드의 histogram_quantile()이 동작하려면 bucket이 노출되어야 한다.
      percentiles-histogram:
        http.server.requests: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

app:
  inventory:
    hold-ttl-minutes: 30
    sold-out-retry-after-seconds: 5

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
