events {}

http {
    # 두 인스턴스 round-robin. health check는 passive (active는 nginx-plus 필요).
    upstream hello_pani {
        server app-1:8080 max_fails=3 fail_timeout=10s;
        server app-2:8080 max_fails=3 fail_timeout=10s;
    }

    # 어떤 인스턴스가 응답했는지를 응답 헤더로 노출 — stateless 검증에 도움이 된다.
    # X-Upstream: app-1:8080 / app-2:8080 형태.
    server {
        listen 80;

        location / {
            proxy_pass http://hello_pani;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
            add_header X-Upstream $upstream_addr always;
        }
    }
}
